name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-24.04
    # Safety net: without this the GitHub default is 360 min, so a single hung
    # test (or a stuck runner) pins the job for hours. Fail fast instead.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout

      - name: Run pytest
        # Per-test timeout (pytest-timeout): a test that hangs (e.g. an
        # un-mocked network call) is killed at 120 s and reports a full
        # thread-stack traceback pointing at the culprit — instead of hanging
        # the whole suite silently. `thread` method dumps every thread's stack,
        # which is what you want for a hang in a blocking C/socket call.
        run: |
          python -m pytest tests/ --tb=short -q \
            --timeout=120 --timeout-method=thread

  lint-imports:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify all modules import cleanly
        # Catches import-time regressions (circular imports, missing deps,
        # NameErrors at module load). Cheaper than a full pytest pass and a
        # useful first signal.
        run: |
          python -c "
          import importlib, pkgutil, sys
          import src
          for mod in pkgutil.walk_packages(src.__path__, prefix='src.'):
              try:
                  importlib.import_module(mod.name)
              except Exception as e:
                  print(f'IMPORT FAIL: {mod.name}: {e!r}', file=sys.stderr)
                  sys.exit(1)
          print('all src.* modules import ok')
          "
