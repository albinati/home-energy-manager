services:
  hem:
    image: ghcr.io/albinati/home-energy-manager:${HEM_IMAGE_TAG:-main}
    container_name: hem
    pull_policy: always
    restart: unless-stopped

    ports:
      - "127.0.0.1:8000:8000"
      # Tailscale interface — override HEM_TAILSCALE_IP per host (Hetzner prod = 100.x.y.z).
      # When unset, the second binding collapses to loopback (harmless duplicate).
      - "${HEM_TAILSCALE_IP:-127.0.0.1}:8000:8000"

    volumes:
      - /srv/hem/data:/app/data
      - /srv/hem/.env:/app/.env:ro

    # OpenClaw runs on the host with gateway.bind=lan (0.0.0.0). The container
    # reaches it via the gateway of the pinned hem-net bridge (172.30.0.1).
    # We map it as openclaw.host rather than using `host-gateway`, because
    # `host-gateway` resolves to the default docker bridge (172.17.0.1), not
    # our custom network's gateway. The host's public NIC (eth0) is sealed at
    # netfilter by hem-firewall.service (DROP on eth0:18789) so bind=lan does
    # not expose OpenClaw to the Internet.
    extra_hosts:
      - "openclaw.host:172.30.0.1"

    environment:
      DB_PATH: /app/data/energy_state.db
      DAIKIN_TOKEN_FILE: /app/data/.daikin-tokens.json
      HEM_OPENCLAW_TOKEN_FILE: /app/data/.openclaw-token
      API_HOST: 0.0.0.0  # bind inside the namespace; the host port mapping above does the actual gating
      TZ: Europe/London
      PYTHONPATH: /app

    read_only: true
    tmpfs:
      - /tmp:rw,size=64m,mode=1777
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    pids_limit: 200

    # Match the previous systemd-level memory ceilings (MemoryHigh=200M / MemoryMax=400M).
    mem_limit: 400m
    mem_reservation: 200m

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

    logging:
      driver: journald
      options:
        tag: hem

    networks:
      - hem-net

  # ── Story B6 — SPA container ────────────────────────────────────────────
  # nginx-served frontend lifted from src/api/templates/ + src/api/static/.
  # Reverse-proxies /api → hem:8000. Reads the bearer token from
  # /srv/hem/data/.hem-ui-token (minted by HEM lifespan, B1) and writes it
  # into /usr/share/nginx/html/config.js at boot so the SPA can attach it
  # to every /api/* fetch.
  #
  # Rollback: `docker compose stop hem-ui` (the inline UI in HEM keeps
  # serving until B5 decommissions it). Until HEM_UI_AUTH_REQUIRED=true
  # the new bearer guard is inert — turning the SPA off is safe.
  hem-ui:
    image: ghcr.io/albinati/home-energy-manager-ui:${HEM_UI_IMAGE_TAG:-main}
    container_name: hem-ui
    pull_policy: always
    restart: unless-stopped
    depends_on:
      hem:
        condition: service_healthy

    ports:
      - "127.0.0.1:8080:80"
      - "${HEM_TAILSCALE_IP:-127.0.0.1}:8080:80"

    environment:
      HEM_API_URL: http://hem:8000
      # The token is loaded from the bind-mounted hem-ui-token file by
      # ui-entrypoint.sh on container start. The file lives in HEM's
      # data volume so the SPA container reads what HEM minted.
      HEM_UI_TOKEN_FILE: /run/secrets/hem-ui-token

    volumes:
      # Read-only mount of the token file as a "secret" — mounted under
      # /run/secrets/ which the entrypoint reads. Using a bind mount
      # rather than docker secrets keeps the existing root-on-host
      # operations the user has been doing.
      - /srv/hem/data/.hem-ui-token:/run/secrets/hem-ui-token:ro

    # read_only is intentionally OFF — the upstream nginx:alpine entrypoint
    # chain writes to /etc/nginx/conf.d (envsubst-on-templates.sh) on every
    # start, and tmpfs-mounting it just to keep read_only=true was more pain
    # than the marginal hardening was worth for a static-asset + proxy
    # container with no application code. Risk surface = the nginx binary
    # itself, which is mature + audited.
    read_only: false
    tmpfs:
      - /tmp:rw,size=8m,mode=1777
    cap_drop: [ALL]
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      # DAC_READ_SEARCH lets the entrypoint read the 0640 bearer-token file
      # mounted at /run/secrets/hem-ui-token (owned by uid:gid 1001:1001 on
      # the host — written by HEM's lifespan). Without this cap a default
      # cap_drop:ALL strips the kernel's DAC bypass that root usually relies
      # on, so the container's root user gets EACCES on the bind-mounted file.
      - DAC_READ_SEARCH
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    mem_limit: 64m
    mem_reservation: 32m

    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: journald
      options:
        tag: hem-ui

    networks:
      - hem-net

# Pin a known subnet so the bridge gateway IP (172.30.0.1) is stable. The
# container resolves openclaw.host -> 172.30.0.1 (extra_hosts above) and
# reaches OpenClaw on the host. Without this, compose picks the next free
# 172.x.y.0/16 and the gateway IP moves on each `compose down`.
networks:
  hem-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.1
