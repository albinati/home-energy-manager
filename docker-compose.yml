services:
  energy-manager:
    build: .
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      DB_PATH: /app/data/energy_state.db
      # Keep OAuth tokens on the same volume as SQLite so refresh_token survives restarts.
      DAIKIN_TOKEN_FILE: /app/data/.daikin-tokens.json
      TZ: Europe/London
    volumes:
      - energy_state_data:/app/data
      # Tokens live at /app/data/.daikin-tokens.json (see DAIKIN_TOKEN_FILE). Copy once after auth or run auth in-container.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 25s

volumes:
  energy_state_data:
